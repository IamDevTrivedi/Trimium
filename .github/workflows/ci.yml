name: CI/CD

on: 
  push: 
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint check
        run: pnpm run lint

  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier formatting check
        run: pnpm run format:check

  detect-changes:
    runs-on: ubuntu-latest
    needs: [lint, prettier]

    outputs:
      client: ${{ steps.changes.outputs.client }}
      server: ${{ steps.changes.outputs.server }}
    
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
              - 'package.json'

  deploy-client:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' && vars.DEPLOY_TO_EC2 == 'true'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            #!/bin/bash
            # Exit immediately if a command exits with non-zero status
            set -e  

            # Helper function for timestamped logging
            log() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"
            }

            # Load nvm
            source ~/.nvm/nvm.sh

            log "Pulling latest code..."
            cd /home/${{ secrets.EC2_USER }}/my-projects/Trimium

            # Ensure git pull succeeds
            if ! git pull origin main; then
                log "ERROR: git pull failed. Aborting deployment."
                exit 1
            fi

            log "Installing dependencies at root level"
            pnpm install --frozen-lockfile

            log "Installing dependencies at server level..."
            cd server 
            pnpm install --frozen-lockfile

            log "Building server..."
            NODE_OPTIONS="--max-old-space-size=1024" pnpm run build

            log "Downloading GeoIP database"
            cd ..
            pnpm run download:geoip

            CURRENT_HASH=$(git rev-parse HEAD)
            cd ./server/releases/

            # Find the most recent release directory (excluding current symlink if present)
            PREVIOUS_HASH=$(find . -mindepth 1 -maxdepth 1 -type d -printf '%T@ %f\n' | sort -nr | head -n 1 | cut -d' ' -f2)

            # Go back to server directory for release setup
            cd ..

            NEW_RELEASE_DIR="$(pwd)/releases/$CURRENT_HASH"
            mkdir -p "$NEW_RELEASE_DIR"

            cp -r ./dist "$NEW_RELEASE_DIR/"
            rm -rf dist

            # Symlink shared resources into the new release
            ln -sfn "$(pwd)/shared/.env.production" "$NEW_RELEASE_DIR"
            ln -sfn "$(pwd)/shared/logs" "$NEW_RELEASE_DIR"

            # Update 'current' symlink to point to the new release
            ln -sfn "$NEW_RELEASE_DIR" "$(pwd)/current"

            log "Reloading PM2 application with zero-downtime..."
            pm2 reload trimium-server

            log "Waiting 3 seconds for application to stabilize..."
            sleep 3

            HEALTH_ENDPOINT="http://localhost:5000/api/v1/health"
            HEALTH_CHECK_PASSED=false

            log "Starting health check for up to 10 attempts..."

            set +e # Allow health check to fail without exiting the script
            for i in {1..10}; do
                # Use timeout to avoid hanging curl
                status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$HEALTH_ENDPOINT")
                if [ "$status_code" -eq 200 ]; then
                    HEALTH_CHECK_PASSED=true
                    log "Health check passed (attempt $i)."
                    break
                fi
                log "Health check failed (status: $status_code). Retrying in 5 seconds... (attempt $i/10)"
                sleep 5
            done

            set -e # Re-enable exit on error

            if [ "$HEALTH_CHECK_PASSED" = true ]; then
                log "Deployment successful and server is healthy."

                # Cleanup: keep only the 5 most recent releases
                log "Cleaning up old releases, keeping the 5 most recent..."
                cd ./releases
                find . -mindepth 1 -maxdepth 1 -type d -printf '%T@ %f\n' | \
                    sort -nr | \
                    tail -n +6 | \
                    cut -d' ' -f2- | \
                    while read dir; do
                        log "Removing old release: $dir"
                        rm -rf "$dir"
                    done
                cd ..

                pm2 list
                exit 0
            fi

            # --- Rollback procedure ---
            log "Health check failed. Rolling back..."

            # Only rollback if we have a valid previous release
            if [ -n "$PREVIOUS_HASH" ] && [ -d "$(pwd)/releases/$PREVIOUS_HASH" ]; then
                PREVIOUS_RELEASE_DIR="$(pwd)/releases/$PREVIOUS_HASH"
                log "Rolling back to previous release: $PREVIOUS_HASH"
                ln -sfn "$PREVIOUS_RELEASE_DIR" "$(pwd)/current"
                pm2 reload trimium-server
                log "Rollback completed. Previous release restored."
            else
                log "ERROR: No previous release available for rollback. Manual intervention required."
            fi

            # Remove the failed new release directory
            if [ -d "$NEW_RELEASE_DIR" ]; then
                rm -rf "$NEW_RELEASE_DIR"
                log "Removed failed release directory: $NEW_RELEASE_DIR"
            fi

            log "Deployment failed."
            exit 1