name: Deploy Server to EC2

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "package.json"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint check
        run: pnpm run lint

  prettier:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier formatting check
        run: pnpm run format:check

  typecheck:
    runs-on: ubuntu-latest
    needs: prettier

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm --dir server exec tsc --noEmit

  deploy:
    runs-on: ubuntu-latest
    needs: typecheck
    if: vars.DEPLOY_TO_EC2 == 'true'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            source ~/.nvm/nvm.sh            
            cd /home/${{ secrets.EC2_USER }}/my-projects/Trimium
            git pull origin main
            pnpm install --frozen-lockfile
            cd server 
            pnpm install --frozen-lockfile
            NODE_OPTIONS="--max-old-space-size=1024" pnpm run build
            cd ..
            pnpm run download:geoip
            pm2 restart trimium-server
            pm2 save
            pm2 status trimium-server
            echo "Deployment completed."