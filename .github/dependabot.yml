version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: "06:00"
          timezone: Asia/Kolkata
      open-pull-requests-limit: 10
      labels:
          - dependencies
      commit-message:
          prefix: deps
      groups:
          root-npm-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch

    - package-ecosystem: npm
      directory: /client
      schedule:
          interval: weekly
          day: monday
          time: "06:10"
          timezone: Asia/Kolkata
      open-pull-requests-limit: 10
      labels:
          - dependencies
          - client
      commit-message:
          prefix: deps
      groups:
          client-npm-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch

    - package-ecosystem: npm
      directory: /server
      schedule:
          interval: weekly
          day: monday
          time: "06:20"
          timezone: Asia/Kolkata
      open-pull-requests-limit: 10
      labels:
          - dependencies
          - server
      commit-message:
          prefix: deps
      groups:
          server-npm-minor-and-patch:
              patterns:
                  - "*"
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: "06:30"
          timezone: Asia/Kolkata
      open-pull-requests-limit: 5
      labels:
          - dependencies
          - ci
      commit-message:
          prefix: ci
